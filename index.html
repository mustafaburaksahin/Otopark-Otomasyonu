<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>Otopark Otomasyonu</title>
    <style>
        body { margin: 0; background-color: #1a1a1a; font-family: 'Segoe UI', Tahoma, sans-serif; color: white; height: 100vh; display: flex; flex-direction: column; transition: 0.3s; overflow: hidden; }
        nav { display: flex; justify-content: space-between; align-items: center; padding: 10px 25px; background-color: #2980b9; box-shadow: 0 4px 10px rgba(0,0,0,0.4); }
        .nav-right { display: flex; align-items: center; gap: 15px; }
        .saat-panel { font-weight: bold; background: rgba(0,0,0,0.3); padding: 5px 15px; border-radius: 20px; font-family: monospace; }
        
        .ana-panel { display: flex; flex: 1; padding: 20px; gap: 20px; overflow: hidden; }
        .yan-panel { flex: 1; background: #242424; border-radius: 15px; padding: 20px; border: 1px solid #333; display: flex; flex-direction: column; box-shadow: 5px 5px 15px rgba(0,0,0,0.3); }
        .orta-panel { flex: 3; background: #242424; border-radius: 15px; padding: 20px; border: 1px solid #333; overflow-y: auto; position: relative; }

        /* HARİTA DÜZENİ */
        .otopark-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1.2fr 1fr 1fr;
            gap: 12px;
            background: #2c3e50;
            padding: 30px;
            border-radius: 15px;
            border: 4px solid #34495e;
            min-height: 600px;
        }

        .slot { height: 65px; display: flex; align-items: center; justify-content: center; border-radius: 6px; font-weight: bold; cursor: pointer; transition: 0.2s; font-size: 11px; text-transform: uppercase; border: 2px solid transparent; }
        .bos { background-color: #27ae60; color: rgba(255,255,255,0.7); }
        .dolu { background-color: #c0392b; color: white; box-shadow: inset 0 0 10px rgba(0,0,0,0.3); }
        .slot:hover { transform: scale(1.05); z-index: 2; border-color: #fff; }

        .yol-alani { background: transparent; display: flex; justify-content: center; align-items: center; pointer-events: none; position: relative; }
        .yol-alani::after { content: ""; width: 2px; height: 100%; border-left: 2px dashed #f1c40f; opacity: 0.5; }
        
        /* GİRİŞ ÇIKIŞ YAZILARI */
        .yol-alani:nth-of-type(1)::before { content: "⬇️ GİRİŞ"; position: absolute; top: -25px; color: #f1c40f; font-size: 12px; font-weight: bold; }
        .yol-alani:nth-of-type(10)::after { content: "⬆️ ÇIKIŞ"; position: absolute; bottom: -25px; color: #f1c40f; font-size: 12px; font-weight: bold; }

        /* MODAL (ONAY PENCERESİ) */
        #onayModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 9999; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal-icerik { background: #242424; padding: 30px; border-radius: 15px; border: 2px solid #e74c3c; text-align: center; width: 320px; box-shadow: 0 0 30px rgba(231, 76, 60, 0.4); }

        /* FORM VE BUTONLAR */
        input[type="text"] { width: 100%; padding: 12px; border-radius: 8px; border: 1px solid #444; background: #333; color: white; outline: none; margin-bottom: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; border-radius: 8px; border: none; margin-top: 5px; cursor: pointer; font-weight: bold; transition: 0.2s; color: white; }
        #ekleBtn { background: #2ecc71; } #silBtn { background: #e74c3c; } #updateBtn { background: #3498db; }
        .ciro-box { margin-top: auto; padding: 15px; background: rgba(46, 204, 113, 0.15); border: 1px solid #2ecc71; border-radius: 10px; display: flex; justify-content: space-between; align-items: center; }
        .hareket-panel { flex: 1; overflow-y: auto; margin-top: 10px; }
        .hareket-blok { background: rgba(52, 152, 219, 0.1); padding: 10px; margin-bottom: 8px; border-left: 4px solid #3498db; border-radius: 5px; font-size: 11px; }
        
        #mesaj { position: fixed; top: -100px; left: 50%; transform: translateX(-50%); padding: 15px 30px; border-radius: 10px; z-index: 1000; transition: 0.5s; font-weight: bold; }
        #mesaj.goster { top: 20px; }
        .basari { background: #2ecc71; } .hata { background: #e74c3c; }
        .Beyaz-mode, .Beyaz-mode .yan-panel, .Beyaz-mode .orta-panel { background-color: #ecf0f1; color: #2c3e50; border-color: #bdc3c7; }
        #Tema { background: none; font-size: 26px; width: auto; margin: 0; }
        .arama-bulundu { transform: scale(1.15); border-color: #fff !important; box-shadow: 0 0 20px #3498db; z-index: 10; }
        .arama-soluk { opacity: 0.15; filter: grayscale(1); }
    </style>
</head>
<body>
    <!-- SIFIRLAMA MODALI -->
    <div id="onayModal">
        <div class="modal-icerik">
            <h3 style="color: #e74c3c; margin-top: 0;">⚠️ DİKKAT!</h3>
            <p style="font-size: 14px; color: #ccc;">Günlük ciroyu sıfırlamak istediğine emin misin? Bu işlem geri alınamaz!</p>
            <div style="display: flex; gap: 10px; margin-top: 20px;">
                <button id="vazgecBtn" style="background: #7f8c8d;">VAZGEÇ</button>
                <button id="kesinSifirlaBtn" style="background: #e74c3c;">EVET, SIFIRLA</button>
            </div>
        </div>
    </div>

    <div id="mesaj"></div>
    <nav>
        <span>🅿️ OTOPARK SİSTEMİ</span>
        <div class="nav-right">
            <div id="saat" class="saat-panel">00:00:00</div>
            <button id="Tema">☀️</button>
        </div>
    </nav>

    <div class="ana-panel">
        <div class="yan-panel">
            <h3 style="text-align: center; color: #3498db;">🚗 İŞLEMLER</h3>
            <form onsubmit="return false;">
                <input id="aracplaka" type="text" placeholder="PLAKA GİR (Örn: 38 AGA 38)">
                <button id="ekleBtn">EKLE</button>
                <button id="silBtn">SİL</button>
                <button id="updateBtn">GÜNCELLE</button>
            </form>
            <div class="ciro-box">
                <span id="gunlukCiro" style="font-size: 16px; color: #2ecc71; font-weight: bold;">💰 Ciro: 0 TL</span>
                <button id="sifirlaBtn" style="width: auto; margin: 0; padding: 5px 10px; background: #e74c3c; font-size: 12px;">🗑️</button>
            </div>
        </div>

        <div class="orta-panel">
            <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                <h3 style="margin: 0;">🗺️ YERLEŞİM PLANI</h3>
                <input type="text" id="plakaAra" placeholder="🔍 Haritada Bul..." style="width: 180px; margin: 0; padding: 8px;">
            </div>
            <div class="otopark-grid" id="grid"></div>
        </div>

        <div class="yan-panel">
            <h3 style="text-align: center; color: #f1c40f;">📊 DURUM</h3>
            <p id="dolusayisi" style="margin: 5px 0;">Dolu: 0</p>
            <p id="bossayisi" style="margin: 5px 0;">Boş: 40</p>
            <hr style="width:100%; border: 0.5px solid #444;">
            <div id="hareketler" class="hareket-panel"></div>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
